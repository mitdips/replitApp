<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>replitApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    p {
      font-size: 1.25rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }

    .status {
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>replitApp</h1>
    <p>Your application is up and running!</p>
    <div class="badge">Ready to build</div>
    <p class="status" id="status">Checking server status...</p>
  </div>

  <script>
    fetch('/api/health')
      .then(res => res.json())
      .then(data => {
        document.getElementById('status').textContent = 'Server status: ' + data.status;
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Could not reach server';
      });
  </script>
</body>
</html>
